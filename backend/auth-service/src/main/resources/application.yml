server:
  port: 8081

spring:
  application:
    name: auth-service

  config:
    import: "optional:configserver:http://localhost:8888/"

  datasource:
    url: jdbc:mysql://localhost:3306/omnichat_auth?createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: password # Replace in production or move to Config Server
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jwt:
  # The private key must be base64 encoded and wrapped in -----BEGIN PRIVATE KEY----- ...
  # Will be fetched from Config Server ideally
  private-key: "changeme"
  public-key: "changeme"
  expiration-ms: 900000 # 15 minutes
  refresh-expiration-ms: 604800000 # 7 days

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
