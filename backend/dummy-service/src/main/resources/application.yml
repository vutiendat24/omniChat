server:
  port: 8082

spring:
  application:
    name: dummy-service
  config:
    import: "optional:configserver:http://localhost:8888/"

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh
