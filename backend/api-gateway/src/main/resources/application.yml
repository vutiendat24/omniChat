server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  # Connect to config server to fetch JWT public key and other central configs
  config:
    import: "optional:configserver:http://localhost:8888/"
    
  # Redis configuration for Rate Limiting
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000" # Placeholder cho frontend dashboard
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/default
                
        - id: dummy-service
          uri: lb://dummy-service
          predicates:
            - Path=/api/v1/dummy/**
          filters:
            - name: CircuitBreaker
              args:
                name: dummyCircuitBreaker
                fallbackUri: forward:/fallback/default
                
        # TODO: Cấu hình các route cho các service khác dưới đây
        # - id: conversation-service
        #   uri: lb://conversation-service
        #   predicates:
        #     - Path=/api/v1/conversations/**

# Bật Actuator để xem metrics và refresh config
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

# Resilience4j Circuit Breaker Config
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        registerHealthIndicator: true
  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
